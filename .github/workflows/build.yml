name: Build Flash Attention ROCm Windows (30min Test)

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  FLASH_ATTN_LOCAL_VERSION: "rocm7.12torch2.10gfx1201"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Enable long paths
        run: git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Activate MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel ninja
          pip install torch torchvision torchaudio rocm[devel] --index-url https://repo.amd.com/rocm/whl/gfx120X-all
          rocm-sdk init

      - name: Setup environment
        run: |
          $ROCM_ROOT = (rocm-sdk path --root).Trim()
          $ROCM_BIN = (rocm-sdk path --bin).Trim()

          echo "ROCM_HOME=$ROCM_ROOT" >> $env:GITHUB_ENV
          echo "$ROCM_ROOT\lib\llvm\bin" >> $env:GITHUB_PATH
          echo "$ROCM_BIN" >> $env:GITHUB_PATH

          echo "CC=clang-cl" >> $env:GITHUB_ENV
          echo "CXX=clang-cl" >> $env:GITHUB_ENV
          echo "DISTUTILS_USE_SDK=1" >> $env:GITHUB_ENV

          echo "TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=FALSE" >> $env:GITHUB_ENV
          echo "FLASH_ATTENTION_TRITON_AMD_ENABLE=FALSE" >> $env:GITHUB_ENV

          echo "MAX_JOBS=$env:NUMBER_OF_PROCESSORS" >> $env:GITHUB_ENV

          echo "PYTORCH_ROCM_ARCH=gfx1201" >> $env:GITHUB_ENV
          echo "GPU_ARCHS=gfx1201" >> $env:GITHUB_ENV

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            build/temp.*
          key: flashattn-build-cache
          restore-keys: |
            flashattn-build-cache

      - name: Build (30min timed)
        shell: pwsh
        run: |
          Write-Host "===== BUILD START (30 min test) ====="

          $proc = Start-Process python -ArgumentList "setup.py build_ext --inplace" `
            -NoNewWindow -PassThru

          $timeout = 1800
          $elapsed = 0

          while (-not $proc.HasExited -and $elapsed -lt $timeout) {
              Start-Sleep -Seconds 10
              $elapsed += 10
              Write-Host "Elapsed: $elapsed sec"
          }

          if (-not $proc.HasExited) {
              Write-Host "Stopping build after 30 minutes"
              Stop-Process -Id $proc.Id -Force
          }

          Write-Host "===== BUILD STOP ====="

      - name: Cleanup before cache
        run: |
          if (Test-Path build\lib) {
            Remove-Item -Recurse -Force build\lib
          }

      - name: Save build cache
        uses: actions/cache@v4
        with:
          path: |
            build/temp.*
          key: flashattn-build-cache
          
